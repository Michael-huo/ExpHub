# ==============================================================================
# ExpHub 平台外部依赖汇总配置 (config/platform.yaml)
# 作用：统一管理外部 Conda 环境、算法仓库 (Repos) 和模型资产 (Models)
# ==============================================================================

environments:
  phases:
    segment:
      python: "/home/hx/anaconda3/envs/segmentclip/bin/python"
      conda: "segmentclip"
    semantic_openclip:
      python: "/home/hx/anaconda3/envs/segmentclip/bin/python"
      conda: "segmentclip"
    prompt:
      python: "/home/hx/anaconda3/envs/vlm_prompt/bin/python"
      conda: "vlm_prompt"
    prompt_smol:
      python: "/home/hx/anaconda3/envs/prompt_smol/bin/python"
      conda: "prompt_smol"
    slam:
      python: "/home/hx/anaconda3/envs/droid/bin/python"
      conda: "droid"

repos:
  droid_slam: "/data/hx/DROID-SLAM"

services:
  comfyui:
    base_url: "http://127.0.0.1:8188"
    workflow_json: "/data/hx/ExpHub/config/video_wan2_2_5B_fun_inpaint.json"
    output_root: "/home/hx/ComfyUI/output"
    timeout_sec: 1800
    poll_interval_sec: 2.0

models:
  qwen2_vl:
    path: "/data/hx/Qwen2-VL/models/Qwen2-VL-7B-Instruct"

  droid:
    path: "/data/hx/DROID-SLAM/droid.pth"
