# ==============================================================================
# ExpHub 平台外部依赖汇总配置 (config/platform.yaml)
# 作用：统一管理外部 Conda 环境、算法仓库 (Repos) 和模型资产 (Models)
# ==============================================================================

environments:
  phases:
    segment:
      python: "/home/hx/anaconda3/envs/segmentclip/bin/python"
      conda: "segmentclip"
    semantic_openclip:
      python: "/home/hx/anaconda3/envs/segmentclip/bin/python"
      conda: "segmentclip"
    slam:
      python: "/home/hx/anaconda3/envs/droid/bin/python"
      conda: "droid"
    lora:
      python: "/home/hx/anaconda3/envs/videox/bin/python"
      conda: "videox"

repos:
  droid_slam: "/data/hx/DROID-SLAM"
  videox_fun: "/data/hx/VideoX-Fun"

services:
  comfyui:
    active_profile: "base"
    profiles:
      base:
        workflow_json: "/data/hx/ExpHub/config/workflows/wan2_2_5b_inp_base.json"
        lora:
          enabled: false
        nodes:
          ksampler: "3"
          positive_prompt: "6"
          negative_prompt: "7"
          vae_decode: "8"
          create_video: "57"
          save_video: "58"
          start_image: "70"
          video_spec: "73"
          end_image: "74"
          save_image: "75"
      lora_gdut:
        workflow_json: "/data/hx/ExpHub/config/workflows/wan2_2_5b_inp_lora.json"
        lora:
          enabled: true
          name: "wan22_fun_5b_inp_gdut.safetensors"
          strength_model: 1.0
          strength_clip: 1.0
        nodes:
          ksampler: "11"
          positive_prompt: "16"
          negative_prompt: "12"
          vae_decode: "6"
          create_video: "7"
          save_video: "8"
          start_image: "4"
          video_spec: "9"
          end_image: "5"
          save_image: "10"
          lora_loader: "15"
      lora_ncd:
        workflow_json: "/data/hx/ExpHub/config/workflows/wan2_2_5b_inp_lora.json"
        lora:
          enabled: true
          name: "wan22_fun_5b_inp_ncd.safetensors"
          strength_model: 1.0
          strength_clip: 1.0
        nodes:
          ksampler: "11"
          positive_prompt: "16"
          negative_prompt: "12"
          vae_decode: "6"
          create_video: "7"
          save_video: "8"
          start_image: "4"
          video_spec: "9"
          end_image: "5"
          save_image: "10"
          lora_loader: "15"
      lora_tum:
        workflow_json: "/data/hx/ExpHub/config/workflows/wan2_2_5b_inp_lora.json"
        lora:
          enabled: true
          name: "wan22_fun_5b_inp_tum.safetensors"
          strength_model: 1.0
          strength_clip: 1.0
        nodes:
          ksampler: "11"
          positive_prompt: "16"
          negative_prompt: "12"
          vae_decode: "6"
          create_video: "7"
          save_video: "8"
          start_image: "4"
          video_spec: "9"
          end_image: "5"
          save_image: "10"
          lora_loader: "15"
    timeout_sec: 1800
    poll_interval_sec: 2.0
    parallel: true
    schedule: "longest_first"
    instances:
      - name: "gpu0"
        base_url: "http://127.0.0.1:8188"
        output_root: "/home/hx/ComfyUI/output/gpu0"
      - name: "gpu1"
        base_url: "http://127.0.0.1:8189"
        output_root: "/home/hx/ComfyUI/output/gpu1"
      - name: "gpu2"
        base_url: "http://127.0.0.1:8190"
        output_root: "/home/hx/ComfyUI/output/gpu2"

models:
  qwen2_vl:
    path: "/data/hx/Qwen2-VL/models/Qwen2-VL-7B-Instruct"

  droid:
    path: "/data/hx/DROID-SLAM/droid.pth"
